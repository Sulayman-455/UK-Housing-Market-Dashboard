<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Housing Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
            color: #333;
        }

        .navbar {
            background: #1a3a5c;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar h1 {
            color: white;
            font-size: 1.2rem;
        }

        .navbar nav a {
            color: #cdd9e5;
            text-decoration: none;
            margin-left: 25px;
            font-size: 0.95rem;
        }

        .navbar nav a:hover {
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
        }

        .card h2 {
            font-size: 1.1rem;
            color: #1a3a5c;
            margin-bottom: 20px;
        }

        .kpi-row {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .kpi {
            background: white;
            border-radius: 8px;
            padding: 20px 25px;
            flex: 1;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
            border-left: 4px solid #1a3a5c;
        }

        .kpi .label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
        }

        .kpi .value {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a3a5c;
        }

        canvas {
            max-height: 400px;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <h1>UK Housing Market Dashboard</h1>
        <nav>
            <a href="/">Overview</a>
            <a href="/regional/">Regional</a>
            <a href="/property-types/">Property Types</a>
            <a href="/first-time-buyers/">First Time Buyers</a>
        </nav>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>

</html>
